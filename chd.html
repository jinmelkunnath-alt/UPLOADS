<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH!LD P0RN — MOMMY UPLOADS</title>

    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #06060c;
            --bg-card: rgba(16, 16, 28, 0.55);
            --bg-card-hover: rgba(22, 22, 38, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.16);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --glow-purple: rgba(120, 60, 220, 0.35);
            --glow-blue: rgba(50, 130, 240, 0.3);
            --glow-teal: rgba(30, 200, 180, 0.25);
            --accent: #7b6cf6;
            --accent-warm: #f0a060;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5), 0 1px 4px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 20px 50px rgba(0, 0, 0, 0.65), 0 4px 16px rgba(100, 80, 220, 0.25);
            --radius-card: 18px;
            --radius-thumb: 14px;
            --transition-fast: 180ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-smooth: 350ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        /* ──────────────────────────────
           ANIMATED BACKGROUND — GLOW BLOBS
           ────────────────────────────── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            will-change: transform;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        .bg-blob--1 {
            width: 55vw;
            height: 55vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, rgba(130, 70, 230, 0.7) 0%, rgba(80, 40, 180, 0.15) 60%, transparent 80%);
            top: -15%;
            left: -10%;
            animation-name: floatBlob1;
            animation-duration: 14s;
        }

        .bg-blob--2 {
            width: 45vw;
            height: 45vw;
            max-width: 550px;
            max-height: 550px;
            background: radial-gradient(circle, rgba(40, 120, 230, 0.6) 0%, rgba(30, 80, 190, 0.12) 60%, transparent 80%);
            bottom: -12%;
            right: -8%;
            animation-name: floatBlob2;
            animation-duration: 16s;
        }

        .bg-blob--3 {
            width: 35vw;
            height: 35vw;
            max-width: 420px;
            max-height: 420px;
            background: radial-gradient(circle, rgba(20, 190, 170, 0.5) 0%, rgba(15, 140, 130, 0.1) 60%, transparent 80%);
            top: 50%;
            left: 55%;
            animation-name: floatBlob3;
            animation-duration: 18s;
        }

        @keyframes floatBlob1 {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(8vw, 6vh) scale(1.1);
            }
            66% {
                transform: translate(-3vw, 10vh) scale(0.92);
            }
            100% {
                transform: translate(5vw, -4vh) scale(1.04);
            }
        }

        @keyframes floatBlob2 {
            0% {
                transform: translate(0, 0) scale(1.05);
            }
            33% {
                transform: translate(-6vw, -5vh) scale(0.93);
            }
            66% {
                transform: translate(4vw, -8vh) scale(1.08);
            }
            100% {
                transform: translate(-3vw, 6vh) scale(0.96);
            }
        }

        @keyframes floatBlob3 {
            0% {
                transform: translate(0, 0) scale(0.95);
            }
            33% {
                transform: translate(-5vw, 7vh) scale(1.07);
            }
            66% {
                transform: translate(6vw, -3vh) scale(0.9);
            }
            100% {
                transform: translate(-2vw, -6vh) scale(1.03);
            }
        }

        /* Subtle noise/dot grain overlay for cinematic texture */
        .bg-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
        }

        /* ──────────────────────────────
           MAIN CONTENT
           ────────────────────────────── */
        .main-content {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 24px 60px;
        }

        /* ──────────────────────────────
           HEADER
           ────────────────────────────── */
        .header {
            padding: 20px 0 36px;
            text-align: left;
        }

        .header__brand {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
            opacity: 0.75;
        }

        .header__title {
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.05;
            background: linear-gradient(135deg,
                    #e8e0f8 0%,
                    #c4b8f0 25%,
                    #9dd0f8 50%,
                    #c4b8f0 75%,
                    #e8e0f8 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 6s ease-in-out infinite;
            margin: 0;
            filter: drop-shadow(0 0 18px rgba(150, 120, 230, 0.3));
        }

        @keyframes shimmerText {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .header__subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 0.02em;
            opacity: 0.8;
        }

        /* ──────────────────────────────
           VIDEO GRID
           ────────────────────────────── */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            perspective: 1200px;
        }

        @media (max-width: 1200px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 18px;
            }
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .main-content {
                padding: 16px 14px 40px;
            }
            .header {
                padding: 10px 0 24px;
            }
            .header__title {
                font-size: clamp(1.8rem, 6vw, 2.6rem);
            }
        }

        @media (max-width: 440px) {
            .video-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .main-content {
                padding: 10px 8px 32px;
            }
        }

        /* ──────────────────────────────
           VIDEO CARD
           ────────────────────────────── */
        .video-card {
            position: relative;
            cursor: pointer;
            border-radius: var(--radius-card);
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition:
                transform var(--transition-smooth),
                box-shadow var(--transition-smooth),
                border-color var(--transition-smooth),
                background var(--transition-smooth);
            will-change: transform;
            transform-origin: center center;
            /* Initial entrance state */
            opacity: 0;
            transform: translateY(36px);
            animation: cardEntrance 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            animation-play-state: paused;
        }

        .video-card.entered {
            animation-play-state: running;
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(36px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card:hover,
        .video-card.hover-active {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card-hover);
            z-index: 10;
        }

        .video-card:active {
            transform: scale(0.96) !important;
            transition: transform 100ms cubic-bezier(0.22, 0.61, 0.36, 1) !important;
        }

        /* Thumbnail container */
        .video-card__thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #0d0d18;
        }

        .video-card__thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        .video-card:hover .video-card__thumb img,
        .video-card.hover-active .video-card__thumb img {
            transform: scale(1.1);
        }

        /* Gradient overlay on thumbnail */
        .video-card__thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(6, 6, 16, 0.85) 0%,
                    rgba(6, 6, 16, 0.35) 45%,
                    rgba(6, 6, 16, 0.05) 75%,
                    transparent 100%);
            transition: opacity var(--transition-smooth);
            pointer-events: none;
            z-index: 2;
        }

        .video-card:hover .video-card__thumb-overlay,
        .video-card.hover-active .video-card__thumb-overlay {
            opacity: 0.75;
        }

        /* Play icon */
        .video-card__play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 3;
            pointer-events: none;
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition:
                opacity var(--transition-fast),
                transform var(--transition-bounce),
                background var(--transition-fast),
                border-color var(--transition-fast),
                box-shadow var(--transition-fast);
            box-shadow: 0 0 0 0 rgba(160, 130, 240, 0);
        }

        .video-card__play svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            margin-left: 3px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            transition: transform var(--transition-fast);
        }

        .video-card:hover .video-card__play,
        .video-card.hover-active .video-card__play {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 32px rgba(140, 110, 240, 0.4), 0 0 60px rgba(120, 90, 220, 0.2);
        }

        .video-card:hover .video-card__play svg,
        .video-card.hover-active .video-card__play svg {
            transform: scale(1.08);
        }

        /* Shine reflection on hover */
        .video-card__shine {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            opacity: 0;
            background: linear-gradient(105deg,
                    transparent 38%,
                    rgba(255, 255, 255, 0.04) 42%,
                    rgba(255, 255, 255, 0.1) 45%,
                    rgba(255, 255, 255, 0.04) 48%,
                    transparent 52%);
            transition: opacity 0.3s ease;
            transform: translateX(-100%);
        }

        .video-card:hover .video-card__shine,
        .video-card.hover-active .video-card__shine {
            opacity: 1;
            animation: shineSweep 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes shineSweep {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* Card info / title area */
        .video-card__info {
            position: relative;
            z-index: 5;
            padding: 14px 16px 16px;
            background: rgba(10, 10, 20, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .video-card__title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.3;
            transition: color var(--transition-fast);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-card:hover .video-card__title,
        .video-card.hover-active .video-card__title {
            color: #ffffff;
        }

        /* Ripple element (dynamically created) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            background: radial-gradient(circle,
                    rgba(180, 150, 240, 0.5) 0%,
                    rgba(140, 100, 220, 0.2) 40%,
                    transparent 70%);
            animation: rippleExpand 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes rippleExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* ──────────────────────────────
           LOADING OVERLAY
           ────────────────────────────── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(6, 6, 14, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease-out;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: #b8a8f0;
            border-right-color: rgba(180, 160, 240, 0.5);
            animation: spinnerRotate 0.8s linear infinite;
            box-shadow: 0 0 28px rgba(150, 120, 230, 0.35);
        }

        @keyframes spinnerRotate {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d0c8f0;
            letter-spacing: 0.03em;
            animation: pulseText 1.4s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* ──────────────────────────────
           SCROLLBAR STYLING (Webkit)
           ────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        /* ──────────────────────────────
           FOCUS / ACCESSIBILITY
           ────────────────────────────── */
        .video-card:focus-visible {
            outline: 2px solid rgba(160, 140, 230, 0.7);
            outline-offset: 3px;
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════
         ANIMATED BACKGROUND
         ══════════════════════════════ -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="bg-blob bg-blob--1"></div>
        <div class="bg-blob bg-blob--2"></div>
        <div class="bg-blob bg-blob--3"></div>
    </div>
    <div class="bg-grain" aria-hidden="true"></div>

    <!-- ══════════════════════════════
         LOADING OVERLAY
         ══════════════════════════════ -->
    <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>
        <p class="loading-text">Opening video…</p>
    </div>

    <!-- ══════════════════════════════
         MAIN CONTENT
         ══════════════════════════════ -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <p class="header__brand">MOMMY UPLOADS</p>
            <h1 class="header__title">CH!LD P0RN</h1>
            <p class="header__subtitle">Master the art of building for the modern web</p>
        </header>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid">
            <!-- Cards injected by JavaScript -->
        </div>
    </main>

    <script>
        (function() {
            // ────────────────────────────────────
            // VIDEO DATA
            // Replace thumbnails & URLs with real data in production
            // ────────────────────────────────────
            const videos = [{
                title: 'Introduction to Development',
                thumbnail: 'https://picsum.photos/seed/dev-intro/600/338',
                url: 'https://example.com/course/dev-intro'
            }, {
                title: 'Setting Up Your Environment',
                thumbnail: 'https://picsum.photos/seed/dev-setup/600/338',
                url: 'https://example.com/course/dev-setup'
            }, {
                title: 'HTML & CSS Fundamentals',
                thumbnail: 'https://picsum.photos/seed/dev-htmlcss/600/338',
                url: 'https://example.com/course/html-css'
            }, {
                title: 'JavaScript Essentials',
                thumbnail: 'https://picsum.photos/seed/dev-js/600/338',
                url: 'https://example.com/course/js-essentials'
            }, {
                title: 'Responsive Design Mastery',
                thumbnail: 'https://picsum.photos/seed/dev-responsive/600/338',
                url: 'https://example.com/course/responsive'
            }, {
                title: 'Backend Development Basics',
                thumbnail: 'https://picsum.photos/seed/dev-backend/600/338',
                url: 'https://example.com/course/backend'
            }, {
                title: 'Database Design & SQL',
                thumbnail: 'https://picsum.photos/seed/dev-database/600/338',
                url: 'https://example.com/course/database'
            }, {
                title: 'API Development & REST',
                thumbnail: 'https://picsum.photos/seed/dev-api/600/338',
                url: 'https://example.com/course/api-rest'
            }, {
                title: 'Version Control with Git',
                thumbnail: 'https://picsum.photos/seed/dev-git/600/338',
                url: 'https://example.com/course/git'
            }, {
                title: 'Deployment & DevOps Basics',
                thumbnail: 'https://picsum.photos/seed/dev-deploy/600/338',
                url: 'https://example.com/course/devops'
            }, {
                title: 'Testing & Debugging',
                thumbnail: 'https://picsum.photos/seed/dev-testing/600/338',
                url: 'https://example.com/course/testing'
            }, {
                title: 'Final Project Workshop',
                thumbnail: 'https://picsum.photos/seed/dev-workshop/600/338',
                url: 'https://example.com/course/workshop'
            }];

            // ────────────────────────────────────
            // DOM REFERENCES
            // ────────────────────────────────────
            const videoGrid = document.getElementById('videoGrid');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // ────────────────────────────────────
            // BUILD VIDEO CARDS
            // ────────────────────────────────────
            function buildCard(video, index) {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-label', `Play: ${video.title}`);
                card.style.animationDelay = `${index * 55}ms`;
                // Store URL obfuscated in data attribute
                card.dataset.url = video.url;

                card.innerHTML = `
                    <div class="video-card__thumb">
                        <img
                            src="${video.thumbnail}"
                            alt="${video.title}"
                            loading="${index < 6 ? 'eager' : 'lazy'}"
                            draggable="false"
                        >
                        <div class="video-card__thumb-overlay"></div>
                        <div class="video-card__play" aria-hidden="true">
                            <svg viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1.5 1.2C1.5 0.2 2.6 -0.4 3.5 0.2L22.5 12.5C23.3 13 23.3 14.2 22.5 14.7L3.5 27C2.6 27.6 1.5 27 1.5 26L1.5 1.2Z"/>
                            </svg>
                        </div>
                        <div class="video-card__shine"></div>
                    </div>
                    <div class="video-card__info">
                        <span class="video-card__title">${video.title}</span>
                    </div>
                `;

                // ──────────────────────────────
                // EVENT: Click → Loading → Redirect
                // ──────────────────────────────
                card.addEventListener('click', function(e) {
                    handleCardClick(e, card, video.url);
                });

                // Keyboard accessibility
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleCardClick(e, card, video.url);
                    }
                });

                // ──────────────────────────────
                // EVENT: Magnetic hover + Tilt (desktop only)
                // ──────────────────────────────
                card.addEventListener('mousemove', function(e) {
                    if (window.innerWidth <= 768) return; // Skip on mobile
                    applyTiltAndMagnetic(card, e);
                });

                card.addEventListener('mouseenter', function(e) {
                    if (window.innerWidth <= 768) return;
                    card.classList.add('hover-active');
                    // Prep shine animation by resetting it
                    const shine = card.querySelector('.video-card__shine');
                    if (shine) {
                        shine.style.animation = 'none';
                        shine.offsetHeight; // Force reflow
                        shine.style.animation = '';
                    }
                });

                card.addEventListener('mouseleave', function() {
                    card.classList.remove('hover-active');
                    resetTilt(card);
                });

                return card;
            }

            // ────────────────────────────────────
            // TILT + MAGNETIC EFFECT
            // ────────────────────────────────────
            function applyTiltAndMagnetic(card, e) {
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const cursorX = e.clientX;
                const cursorY = e.clientY;

                // Normalized offset from center (-1 to 1)
                const nx = (cursorX - centerX) / (rect.width / 2);
                const ny = (cursorY - centerY) / (rect.height / 2);

                // Clamp to avoid extreme values
                const cnx = Math.max(-1, Math.min(1, nx));
                const cny = Math.max(-1, Math.min(1, ny));

                const maxTilt = 6; // degrees
                const magneticPull = 5; // pixels

                const rotateY = cnx * maxTilt;
                const rotateX = -cny * maxTilt;
                const translateX = cnx * magneticPull;
                const translateY = cny * magneticPull;
                const scale = 1.04;

                card.style.transform =
                    `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${translateX}px) translateY(${translateY}px) scale(${scale})`;

                // Dynamic shadow shift
                const shadowX = -cnx * 18;
                const shadowY = -cny * 18;
                card.style.boxShadow =
                    `0 ${20 + Math.abs(shadowY * 0.6)}px ${45 + Math.abs(shadowY * 0.4)}px rgba(0,0,0,0.6), ` +
                    `${shadowX}px ${shadowY}px 28px rgba(100,80,220,0.2), ` +
                    `0 4px 16px rgba(0,0,0,0.45)`;
            }

            function resetTilt(card) {
                card.style.transform = '';
                card.style.boxShadow = '';
                card.style.transition =
                    'transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.5s cubic-bezier(0.22, 0.61, 0.36, 1), border-color 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), background 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)';
                // Restore default transition after animation completes
                setTimeout(() => {
                    card.style.transition =
                        'transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), border-color 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), background 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)';
                }, 500);
            }

            // ────────────────────────────────────
            // CLICK HANDLER: Ripple → Overlay → Redirect
            // ────────────────────────────────────
            function handleCardClick(e, card, url) {
                // Prevent double-clicks
                if (card.dataset.clicked === 'true') return;
                card.dataset.clicked = 'true';

                // Create ripple at click/tap position
                createRipple(card, e);

                // Brief compression feedback (handled by :active in CSS)
                // Show loading overlay instantly
                loadingOverlay.classList.add('active');

                // Redirect after subtle delay for smooth transition feel
                const redirectDelay = 140; // ms
                setTimeout(() => {
                    window.location.href = url;
                }, redirectDelay);

                // Reset clicked state after a safe window (in case redirect is blocked)
                setTimeout(() => {
                    card.dataset.clicked = 'false';
                }, 2000);
            }

            // ────────────────────────────────────
            // RIPPLE EFFECT
            // ────────────────────────────────────
            function createRipple(card, e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2.2;
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left) + 'px';
                ripple.style.top = (e.clientY - rect.top) + 'px';
                card.appendChild(ripple);

                // Clean up ripple after animation
                ripple.addEventListener('animationend', () => {
                    if (ripple.parentNode) ripple.parentNode.removeChild(ripple);
                });
            }

            // ────────────────────────────────────
            // RENDER ALL CARDS
            // ────────────────────────────────────
            videos.forEach((video, index) => {
                const card = buildCard(video, index);
                videoGrid.appendChild(card);
            });

            // ────────────────────────────────────
            // STAGGERED ENTRANCE (trigger after render)
            // ────────────────────────────────────
            function triggerEntrance() {
                const cards = videoGrid.querySelectorAll('.video-card');
                cards.forEach((card, i) => {
                    // Small delay then add class to start animation
                    setTimeout(() => {
                        card.classList.add('entered');
                    }, i * 55);
                });
            }

            // Trigger on next frame after layout
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    triggerEntrance();
                });
            });

            // ────────────────────────────────────
            // BASIC PROTECTION MEASURES
            // ────────────────────────────────────
            // Disable right-click context menu
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // Block common inspect shortcuts
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C / Ctrl+U
                if ((e.ctrlKey || e.metaKey) && e.shiftKey &&
                    (e.key === 'I' || e.key === 'J' || e.key === 'C' || e.key === 'i' || e.key === 'j' || e.key ===
                        'c')) {
                    e.preventDefault();
                    return false;
                }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+S (save page)
                if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                    e.preventDefault();
                    return false;
                }
            });

            // ────────────────────────────────────
            // TOUCH DEVICE: Ensure :active feedback works
            // ────────────────────────────────────
            document.addEventListener('touchstart', function() {
                // Empty listener to ensure :active states trigger on iOS
            }, { passive: true });

            console.log('%c🎬 MOMMY UPLOADS — Development %cReady',
                'font-size:1.2em; font-weight:700; color:#c4b8f0;',
                'color:#b0b0c0;');
            console.log('%c✨ Premium OTT Experience Active',
                'font-style:italic; color:#9dd0f8;');

        })();
    </script>
</body>
