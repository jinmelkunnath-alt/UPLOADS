<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CH!|D P0RN — MOMMY UPLOADS</title>

    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #06060c;
            --bg-card: rgba(16, 16, 28, 0.5);
            --bg-card-hover: rgba(22, 22, 38, 0.68);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --glow-purple: rgba(120, 60, 220, 0.35);
            --accent: #8b7cf6;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5), 0 1px 4px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 20px 50px rgba(0, 0, 0, 0.65), 0 4px 16px rgba(120, 100, 220, 0.3);
            --radius-card: 17px;
            --transition-fast: 180ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-smooth: 350ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        /* ──────────────────────────────
           ANIMATED BACKGROUND — GLOW BLOBS
           ────────────────────────────── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.38;
            will-change: transform;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        .bg-blob--1 {
            width: 55vw;
            height: 55vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, rgba(130, 70, 230, 0.65) 0%, rgba(80, 40, 180, 0.12) 60%, transparent 80%);
            top: -15%;
            left: -10%;
            animation-name: floatBlob1;
            animation-duration: 14s;
        }

        .bg-blob--2 {
            width: 45vw;
            height: 45vw;
            max-width: 550px;
            max-height: 550px;
            background: radial-gradient(circle, rgba(40, 120, 230, 0.55) 0%, rgba(30, 80, 190, 0.1) 60%, transparent 80%);
            bottom: -12%;
            right: -8%;
            animation-name: floatBlob2;
            animation-duration: 16s;
        }

        .bg-blob--3 {
            width: 35vw;
            height: 35vw;
            max-width: 420px;
            max-height: 420px;
            background: radial-gradient(circle, rgba(20, 190, 170, 0.45) 0%, rgba(15, 140, 130, 0.08) 60%, transparent 80%);
            top: 50%;
            left: 55%;
            animation-name: floatBlob3;
            animation-duration: 18s;
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(8vw, 6vh) scale(1.1); }
            66% { transform: translate(-3vw, 10vh) scale(0.92); }
            100% { transform: translate(5vw, -4vh) scale(1.04); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0, 0) scale(1.05); }
            33% { transform: translate(-6vw, -5vh) scale(0.93); }
            66% { transform: translate(4vw, -8vh) scale(1.08); }
            100% { transform: translate(-3vw, 6vh) scale(0.96); }
        }

        @keyframes floatBlob3 {
            0% { transform: translate(0, 0) scale(0.95); }
            33% { transform: translate(-5vw, 7vh) scale(1.07); }
            66% { transform: translate(6vw, -3vh) scale(0.9); }
            100% { transform: translate(-2vw, -6vh) scale(1.03); }
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.032;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
        }

        /* ──────────────────────────────
           MAIN CONTENT
           ────────────────────────────── */
        .main-content {
            position: relative;
            z-index: 2;
            max-width: 1500px;
            margin: 0 auto;
            padding: 28px 24px 60px;
        }

        /* ──────────────────────────────
           HEADER
           ────────────────────────────── */
        .header {
            padding: 20px 0 30px;
            text-align: left;
        }

        .header__brand {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
            opacity: 0.75;
        }

        .header__title {
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.05;
            background: linear-gradient(135deg,
                    #e8e0f8 0%, #c4b8f0 25%, #9dd0f8 50%, #c4b8f0 75%, #e8e0f8 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 6s ease-in-out infinite;
            margin: 0;
            filter: drop-shadow(0 0 18px rgba(150, 120, 230, 0.35));
        }

        @keyframes shimmerText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ──────────────────────────────
           FILTER BAR
           ────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 28px;
            margin-bottom: 36px;
            position: relative;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 4px;
            letter-spacing: 0.03em;
            transition: color var(--transition-fast), text-shadow var(--transition-fast);
            position: relative;
            z-index: 1;
            font-family: inherit;
        }

        .filter-btn.active {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(200, 180, 255, 0.8);
        }

        .filter-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2.5px;
            background: linear-gradient(90deg, #9b8cf0, #b6a8ff, #9b8cf0);
            border-radius: 2px;
            transition: left 0.3s cubic-bezier(0.22, 0.61, 0.36, 1), width 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: 0 0 14px rgba(150, 120, 240, 0.7);
            width: 60px;
        }

        /* ──────────────────────────────
           MEDIA GRID
           ────────────────────────────── */
        .media-grid {
            display: grid;
            gap: 18px;
            perspective: 1200px;
        }

        /* Responsive columns */
        @media (max-width: 480px) {
            .media-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .main-content {
                padding: 14px 10px 40px;
            }
            .header {
                padding: 10px 0 20px;
            }
        }
        @media (min-width: 481px) and (max-width: 768px) {
            .media-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
            }
        }
        @media (min-width: 769px) {
            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        /* ──────────────────────────────
           MEDIA CARD (VIDEO & IMAGE)
           ────────────────────────────── */
        .media-card {
            position: relative;
            cursor: pointer;
            border-radius: var(--radius-card);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition:
                transform var(--transition-smooth),
                box-shadow var(--transition-smooth),
                border-color var(--transition-smooth),
                background var(--transition-smooth);
            will-change: transform;
            transform-origin: center center;
            /* ✅ FIX 1: Fixed aspect ratio for all cards — perfectly aligned grid */
            aspect-ratio: 4 / 5;
            /* Entrance animation */
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            animation-play-state: paused;
        }

        .media-card.entered {
            animation-play-state: running;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .media-card:hover,
        .media-card.hover-active {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card-hover);
            z-index: 10;
        }

        .media-card:active {
            transform: scale(0.96) !important;
            transition: transform 100ms cubic-bezier(0.22, 0.61, 0.36, 1) !important;
        }

        /* Thumbnail always fills card, cropped to cover */
        .media-card__thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
            loading: lazy;
        }

        .media-card:hover .media-card__thumb,
        .media-card.hover-active .media-card__thumb {
            transform: scale(1.1);
        }

        /* Overlay gradient preserved for depth */
        .media-card__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(6, 6, 16, 0.75) 0%,
                    rgba(6, 6, 16, 0.3) 45%,
                    transparent 80%);
            transition: opacity var(--transition-fast);
            pointer-events: none;
            z-index: 2;
        }

        .media-card:hover .media-card__overlay,
        .media-card.hover-active .media-card__overlay {
            opacity: 0.7;
        }

        /* Icon container */
        .media-card__icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 3;
            pointer-events: none;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition:
                opacity var(--transition-fast),
                transform var(--transition-bounce),
                background var(--transition-fast),
                border-color var(--transition-fast),
                box-shadow var(--transition-fast);
            box-shadow: 0 0 0 0 rgba(160, 130, 240, 0);
        }

        .media-card:hover .media-card__icon,
        .media-card.hover-active .media-card__icon {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.38);
            box-shadow: 0 0 32px rgba(140, 110, 240, 0.4);
        }

        .media-card__icon svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Shine sweep */
        .media-card__shine {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            opacity: 0;
            background: linear-gradient(105deg,
                    transparent 38%,
                    rgba(255, 255, 255, 0.04) 42%,
                    rgba(255, 255, 255, 0.12) 45%,
                    rgba(255, 255, 255, 0.04) 48%,
                    transparent 52%);
            transition: opacity 0.3s ease;
            transform: translateX(-100%);
        }

        .media-card:hover .media-card__shine,
        .media-card.hover-active .media-card__shine {
            opacity: 1;
            animation: shineSweep 0.85s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes shineSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            background: radial-gradient(circle,
                    rgba(180, 150, 240, 0.5) 0%,
                    rgba(140, 100, 220, 0.2) 40%,
                    transparent 70%);
            animation: rippleExpand 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes rippleExpand {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(0); }
            100% { width: 300px; height: 300px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* ──────────────────────────────
           LOADING OVERLAY (for videos)
           ────────────────────────────── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(6, 6, 14, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease-out;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: #b8a8f0;
            border-right-color: rgba(180, 160, 240, 0.5);
            animation: spinnerRotate 0.8s linear infinite;
            box-shadow: 0 0 28px rgba(150, 120, 230, 0.35);
        }

        @keyframes spinnerRotate { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d0c8f0;
            letter-spacing: 0.03em;
            animation: pulseText 1.4s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* ──────────────────────────────
           FULLSCREEN IMAGE VIEWER
           ────────────────────────────── */
        .image-viewer {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(4, 4, 12, 0.88);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .image-viewer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .image-viewer__content {
            position: relative;
            max-width: 92vw;
            max-height: 92vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-viewer__img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            border-radius: 6px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(120, 100, 220, 0.25);
            transition: transform 0.2s ease, opacity 0.2s ease;
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        .image-viewer__close {
            position: fixed;
            top: 22px;
            right: 28px;
            width: 44px;
            height: 44px;
            background: rgba(20, 20, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.5);
        }

        .image-viewer__close:hover {
            background: rgba(40, 40, 55, 0.75);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.06);
        }

        .image-viewer__close svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2.2;
        }

        .zoom-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            z-index: 1001;
        }

        /* ──────────────────────────────
           SCROLLBAR
           ────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.07);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
    </style>
</head>

    <!-- Animated background -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="bg-blob bg-blob--1"></div>
        <div class="bg-blob bg-blob--2"></div>

    <div class="bg-grain" aria-hidden="true"></div>

    <!-- Loading overlay for videos -->
    <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>

    <!-- Fullscreen image viewer -->
    <div class="image-viewer" id="imageViewer" role="dialog" aria-modal="true" aria-label="Fullscreen image viewer">

    <main class="main-content">

        <div class="filter-bar" id="filterBar">

        <!-- Media grid -->
        <div class="media-grid" id="mediaGrid"></div>
    </main>

                { type: 'image', thumbnail: 'https://i.ibb.co/fzppMVRv/Screenshot-20260429-143400.jpg', url: 'https://i.ibb.co/fzppMVRv/Screenshot-20260429-143400.jpg' },
                { type: 'video', thumbnail: 'https://i.ibb.co/7tF1kD2c/Screenshot-20260429-142244.jpg', url: 'https://mega.nz/file/nl5hFKyJ#USKi7e10OYWxCbBLgBbX2w572D4ETUNymla9uwSaTYU' },
                { type: 'image', thumbnail: 'https://i.ibb.co/7t5g7pY9/Screenshot-20260429-143250.jpg', url: 'https://i.ibb.co/7t5g7pY9/Screenshot-20260429-143250.jpg' },
                { type: 'video', thumbnail: 'https://i.ibb.co/Lzqry3Y9/Screenshot-20260429-142824.jpg', url: 'https://mega.nz/file/OhQBWRpb#YXn9Ayddmzp__3HR4jxWRuQYkLHqXLKE8k12QCUIgBk' }
            ];

            let currentFilter = 'video';
            const mediaGrid = document.getElementById('mediaGrid');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const imageViewer = document.getElementById('imageViewer');
            const viewerImage = document.getElementById('viewerImage');
            const closeViewerBtn = document.getElementById('closeViewerBtn');
            const filterIndicator = document.getElementById('filterIndicator');
            const filterButtons = document.querySelectorAll('.filter-btn');

            // ──────────────────────────────
            // FILTER LOGIC
            // ──────────────────────────────
            function setFilter(filterType) {
                currentFilter = filterType;
                filterButtons.forEach(btn => {
                    const isActive = btn.dataset.filter === filterType;
                    btn.classList.toggle('active', isActive);
                });
                const activeBtn = document.querySelector(`.filter-btn[data-filter="${filterType}"]`);
                if (activeBtn) {
                    const rect = activeBtn.getBoundingClientRect();
                    const parentRect = activeBtn.parentNode.getBoundingClientRect();
                    filterIndicator.style.left = (rect.left - parentRect.left) + 'px';
                    filterIndicator.style.width = rect.width + 'px';
                }
                renderGrid();
            }

            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => setFilter(btn.dataset.filter));
            });

            // Initialize indicator position
            window.addEventListener('load', () => {
                const activeBtn = document.querySelector('.filter-btn.active');
                if (activeBtn) {
                    const rect = activeBtn.getBoundingClientRect();
                    const parentRect = activeBtn.parentNode.getBoundingClientRect();
                    filterIndicator.style.left = (rect.left - parentRect.left) + 'px';
                    filterIndicator.style.width = rect.width + 'px';
                }
            });
            window.addEventListener('resize', () => {
                const activeBtn = document.querySelector('.filter-btn.active');
                if (activeBtn) {
                    const rect = activeBtn.getBoundingClientRect();
                    const parentRect = activeBtn.parentNode.getBoundingClientRect();
                    filterIndicator.style.left = (rect.left - parentRect.left) + 'px';
                    filterIndicator.style.width = rect.width + 'px';
                }
            });

            // ──────────────────────────────
            // RENDER GRID
            // ──────────────────────────────
            function renderGrid() {
                const filtered = mediaItems.filter(m => m.type === currentFilter);
                mediaGrid.innerHTML = '';

                filtered.forEach((item, index) => {
                    const card = buildMediaCard(item, index);
                    mediaGrid.appendChild(card);
                });

                requestAnimationFrame(() => {
                    const cards = mediaGrid.querySelectorAll('.media-card');
                    cards.forEach((card, i) => {
                        card.style.animationDelay = `${i * 45}ms`;
                        card.classList.add('entered');
                    });
                });
            }

            function buildMediaCard(item, index) {
                const card = document.createElement('div');
                card.className = 'media-card';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-label', `Open ${item.type}`);
                card.dataset.type = item.type;
                card.dataset.url = item.url;
                // For images, thumbnail and fullscreen are identical (FIX 2)
                if (item.type === 'image') {
                    card.dataset.full = item.url; // same as thumbnail
                }

                card.innerHTML = `
                    <img class="media-card__thumb" src="${item.thumbnail}" alt="" loading="lazy" draggable="false">
                    <div class="media-card__overlay"></div>
                    <div class="media-card__icon">
                        ${item.type === 'video' 
                            ? `<svg viewBox="0 0 24 28"><path d="M1.5 1.2C1.5 0.2 2.6 -0.4 3.5 0.2L22.5 12.5C23.3 13 23.3 14.2 22.5 14.7L3.5 27C2.6 27.6 1.5 27 1.5 26L1.5 1.2Z"/></svg>`
                            : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`
                        }
                    </div>
                    <div class="media-card__shine"></div>
                `;

                card.addEventListener('click', function(e) {
                    handleCardClick(e, card, item);
                });

                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleCardClick(e, card, item);
                    }
                });

                // Magnetic hover
                card.addEventListener('mousemove', function(e) {
                    if (window.innerWidth <= 768) return;
                    applyTilt(card, e);
                });
                card.addEventListener('mouseenter', function(e) {
                    if (window.innerWidth <= 768) return;
                    card.classList.add('hover-active');
                    const shine = card.querySelector('.media-card__shine');
                    if (shine) {
                        shine.style.animation = 'none';
                        shine.offsetHeight;
                        shine.style.animation = '';
                    }
                });
                card.addEventListener('mouseleave', function() {
                    card.classList.remove('hover-active');
                    resetTilt(card);
                });

                return card;
            }

            function applyTilt(card, e) {
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const nx = (e.clientX - centerX) / (rect.width / 2);
                const ny = (e.clientY - centerY) / (rect.height / 2);
                const cnx = Math.max(-1, Math.min(1, nx));
                const cny = Math.max(-1, Math.min(1, ny));
                const maxTilt = 5;
                const magneticPull = 4;
                const rotateY = cnx * maxTilt;
                const rotateX = -cny * maxTilt;
                const translateX = cnx * magneticPull;
                const translateY = cny * magneticPull;
                const scale = 1.04;
                card.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${translateX}px) translateY(${translateY}px) scale(${scale})`;
                const shadowX = -cnx * 16;
                const shadowY = -cny * 16;
                card.style.boxShadow = `0 20px 45px rgba(0,0,0,0.55), ${shadowX}px ${shadowY}px 28px rgba(100,80,220,0.25)`;
            }

            function resetTilt(card) {
                card.style.transform = '';
                card.style.boxShadow = '';
                card.style.transition = 'transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.45s cubic-bezier(0.22, 0.61, 0.36, 1)';
                setTimeout(() => {
                    card.style.transition = 'transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)';
                }, 450);
            }

            // ──────────────────────────────
            // CLICK HANDLER
            // ──────────────────────────────
            function handleCardClick(e, card, item) {
                if (card.dataset.clicked === 'true') return;
                card.dataset.clicked = 'true';
                createRipple(card, e);

                if (item.type === 'video') {
                    loadingOverlay.classList.add('active');
                    setTimeout(() => {
                        window.location.href = item.url;
                    }, 120);
                } else {
                    // ✅ Open fullscreen with the identical image (item.url = thumbnail)
                    openImageViewer(item.url);
                }

                setTimeout(() => {
                    card.dataset.clicked = 'false';
                }, 800);
            }

            function createRipple(card, e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2;
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left) + 'px';
                ripple.style.top = (e.clientY - rect.top) + 'px';
                card.appendChild(ripple);
                ripple.addEventListener('animationend', () => {
                    if (ripple.parentNode) ripple.parentNode.removeChild(ripple);
                });
            }

            // ──────────────────────────────
            // FULLSCREEN IMAGE VIEWER
            // ──────────────────────────────
            let viewerState = {
                scale: 1,
                translateX: 0,
                translateY: 0,
                dragging: false,
                startX: 0,
                startY: 0,
                lastTranslateX: 0,
                lastTranslateY: 0
            };

            function openImageViewer(fullUrl) {
                viewerImage.src = fullUrl;
                viewerImage.style.transform = 'scale(0.85)';
                viewerImage.style.opacity = '0';
                imageViewer.classList.add('active');

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        viewerImage.style.transition = 'transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.35s ease';
                        viewerImage.style.transform = 'scale(1)';
                        viewerImage.style.opacity = '1';
                    });
                });

                viewerState.scale = 1;
                viewerState.translateX = 0;
                viewerState.translateY = 0;
                applyViewerTransform();
            }

            function closeImageViewer() {
                viewerImage.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                viewerImage.style.transform = 'scale(0.9)';
                viewerImage.style.opacity = '0';
                setTimeout(() => {
                    imageViewer.classList.remove('active');
                    viewerImage.src = ''; // free memory
                }, 200);
            }

            function applyViewerTransform() {
                viewerImage.style.transform = `translate(${viewerState.translateX}px, ${viewerState.translateY}px) scale(${viewerState.scale})`;
            }

            closeViewerBtn.addEventListener('click', closeImageViewer);
            imageViewer.addEventListener('click', function(e) {
                if (e.target === imageViewer) closeImageViewer();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && imageViewer.classList.contains('active')) {
                    closeImageViewer();
                }
            });

            viewerImage.addEventListener('wheel', function(e) {
                if (!imageViewer.classList.contains('active')) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                let newScale = viewerState.scale + delta;
                newScale = Math.min(Math.max(newScale, 1), 3.5);
                viewerState.scale = newScale;
                if (newScale <= 1.01) {
                    viewerState.translateX = 0;
                    viewerState.translateY = 0;
                }
                applyViewerTransform();
            }, { passive: false });

            viewerImage.addEventListener('mousedown', function(e) {
                if (!imageViewer.classList.contains('active') || viewerState.scale <= 1.01) return;
                e.preventDefault();
                viewerState.dragging = true;
                viewerState.startX = e.clientX;
                viewerState.startY = e.clientY;
                viewerState.lastTranslateX = viewerState.translateX;
                viewerState.lastTranslateY = viewerState.translateY;
                viewerImage.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', function(e) {
                if (!viewerState.dragging) return;
                const dx = e.clientX - viewerState.startX;
                const dy = e.clientY - viewerState.startY;
                viewerState.translateX = viewerState.lastTranslateX + dx;
                viewerState.translateY = viewerState.lastTranslateY + dy;
                applyViewerTransform();
            });

            window.addEventListener('mouseup', function() {
                if (viewerState.dragging) {
                    viewerState.dragging = false;
                    viewerImage.style.cursor = '';
                }
            });

            // Touch support
            viewerImage.addEventListener('touchstart', function(e) {
                if (!imageViewer.classList.contains('active') || viewerState.scale <= 1.01) return;
                if (e.touches.length === 1) {
                    viewerState.dragging = true;
                    viewerState.startX = e.touches[0].clientX;
                    viewerState.startY = e.touches[0].clientY;
                    viewerState.lastTranslateX = viewerState.translateX;
                    viewerState.lastTranslateY = viewerState.translateY;
                }
            }, { passive: false });

            window.addEventListener('touchmove', function(e) {
                if (!viewerState.dragging) return;
                if (e.touches.length === 1) {
                    const dx = e.touches[0].clientX - viewerState.startX;
                    const dy = e.touches[0].clientY - viewerState.startY;
                    viewerState.translateX = viewerState.lastTranslateX + dx;
                    viewerState.translateY = viewerState.lastTranslateY + dy;
                    applyViewerTransform();
                }
            });

            window.addEventListener('touchend', function() {
                viewerState.dragging = false;
            });

            // ──────────────────────────────
            // INITIAL RENDER + PROTECTION
            // ──────────────────────────────
            setFilter('video');

            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','J','C','i','j','c'].includes(e.key)) ||
                    ((e.ctrlKey || e.metaKey) && ['u','U','s','S'].includes(e.key))) {
                    e.preventDefault();
                    return false;
                }
            });

            console.log('%c🎬 MOMMY UPLOADS — Fixed Grid & Viewer %cReady',
                'font-size:1.2em; font-weight:700; color:#c4b8f0;', 'color:#b0b0c0;');
        })();
    </script>
</body>
</html>
