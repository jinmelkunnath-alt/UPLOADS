<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CH!!D PR0N — MOMMY UPLOADS</title>

    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #06060c;
            --bg-card: rgba(16, 16, 28, 0.5);
            --bg-card-hover: rgba(22, 22, 38, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --glow-purple: rgba(120, 60, 220, 0.35);
            --accent: #8b7cf6;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5), 0 1px 4px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 20px 50px rgba(0, 0, 0, 0.65), 0 4px 16px rgba(120, 100, 220, 0.4);
            --radius-card: 18px;
            --transition-fast: 180ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-smooth: 350ms cubic-bezier(0.22, 0.61, 0.36, 1);
            --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        /* ──────────────────────────────
           ANIMATED BACKGROUND — GLOW BLOBS
           ────────────────────────────── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.38;
            will-change: transform;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        .bg-blob--1 {
            width: 55vw;
            height: 55vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, rgba(130, 70, 230, 0.65) 0%, rgba(80, 40, 180, 0.12) 60%, transparent 80%);
            top: -15%;
            left: -10%;
            animation-name: floatBlob1;
            animation-duration: 14s;
        }

        .bg-blob--2 {
            width: 45vw;
            height: 45vw;
            max-width: 550px;
            max-height: 550px;
            background: radial-gradient(circle, rgba(40, 120, 230, 0.55) 0%, rgba(30, 80, 190, 0.1) 60%, transparent 80%);
            bottom: -12%;
            right: -8%;
            animation-name: floatBlob2;
            animation-duration: 16s;
        }

        .bg-blob--3 {
            width: 35vw;
            height: 35vw;
            max-width: 420px;
            max-height: 420px;
            background: radial-gradient(circle, rgba(20, 190, 170, 0.45) 0%, rgba(15, 140, 130, 0.08) 60%, transparent 80%);
            top: 50%;
            left: 55%;
            animation-name: floatBlob3;
            animation-duration: 18s;
        }

        @keyframes floatBlob1 {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(8vw, 6vh) scale(1.1); }
            66% { transform: translate(-3vw, 10vh) scale(0.92); }
            100% { transform: translate(5vw, -4vh) scale(1.04); }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(0, 0) scale(1.05); }
            33% { transform: translate(-6vw, -5vh) scale(0.93); }
            66% { transform: translate(4vw, -8vh) scale(1.08); }
            100% { transform: translate(-3vw, 6vh) scale(0.96); }
        }

        @keyframes floatBlob3 {
            0% { transform: translate(0, 0) scale(0.95); }
            33% { transform: translate(-5vw, 7vh) scale(1.07); }
            66% { transform: translate(6vw, -3vh) scale(0.9); }
            100% { transform: translate(-2vw, -6vh) scale(1.03); }
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.032;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
        }

        /* ──────────────────────────────
           MAIN CONTENT
           ────────────────────────────── */
        .main-content {
            position: relative;
            z-index: 2;
            max-width: 1500px;
            margin: 0 auto;
            padding: 28px 24px 60px;
        }

        /* ──────────────────────────────
           HEADER
           ────────────────────────────── */
        .header {
            padding: 20px 0 36px;
            text-align: left;
        }

        .header__brand {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
            opacity: 0.75;
        }

        .header__title {
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.05;
            background: linear-gradient(135deg,
                    #e8e0f8 0%, #c4b8f0 25%, #9dd0f8 50%, #c4b8f0 75%, #e8e0f8 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 6s ease-in-out infinite;
            margin: 0;
            filter: drop-shadow(0 0 18px rgba(150, 120, 230, 0.35));
        }

        @keyframes shimmerText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header__subtitle {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 0.02em;
            opacity: 0.8;
        }

        /* ──────────────────────────────
           FOLDER GRID
           ────────────────────────────── */
        .folder-grid {
            display: grid;
            gap: 20px;
            perspective: 1200px;
        }

        /* Responsive columns */
        @media (max-width: 480px) {
            .folder-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .main-content {
                padding: 14px 10px 40px;
            }
            .header {
                padding: 10px 0 24px;
            }
        }
        @media (min-width: 481px) and (max-width: 768px) {
            .folder-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
        }
        @media (min-width: 769px) {
            .folder-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        /* ──────────────────────────────
           FOLDER CARD
           ────────────────────────────── */
        .folder-card {
            position: relative;
            cursor: pointer;
            border-radius: var(--radius-card);
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition:
                transform var(--transition-smooth),
                box-shadow var(--transition-smooth),
                border-color var(--transition-smooth),
                background var(--transition-smooth);
            will-change: transform;
            transform-origin: center center;
            aspect-ratio: 16 / 9;
            opacity: 0;
            transform: translateY(30px);
            animation: cardEntrance 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            animation-play-state: paused;
        }

        .folder-card.entered {
            animation-play-state: running;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .folder-card:hover,
        .folder-card.hover-active {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card-hover);
            z-index: 10;
        }

        .folder-card:active {
            transform: scale(0.96) !important;
            transition: transform 100ms cubic-bezier(0.22, 0.61, 0.36, 1) !important;
        }

        .folder-card__thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
            loading: lazy;
        }

        .folder-card:hover .folder-card__thumb,
        .folder-card.hover-active .folder-card__thumb {
            transform: scale(1.08);
        }

        /* Overlay gradient for depth */
        .folder-card__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(6, 6, 16, 0.8) 0%,
                    rgba(6, 6, 16, 0.25) 50%,
                    transparent 80%);
            pointer-events: none;
            z-index: 2;
            transition: opacity var(--transition-fast);
        }

        .folder-card:hover .folder-card__overlay,
        .folder-card.hover-active .folder-card__overlay {
            opacity: 0.9;
        }

        /* Folder icon (top left corner) */
        .folder-card__folder-icon {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 3;
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast), border-color var(--transition-fast);
            pointer-events: none;
        }

        .folder-card:hover .folder-card__folder-icon,
        .folder-card.hover-active .folder-card__folder-icon {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .folder-card__folder-icon svg {
            width: 16px;
            height: 16px;
            fill: #ffffff;
            opacity: 0.9;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        }

        /* Title at bottom */
        .folder-card__title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 4;
            padding: 14px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 80%, transparent 100%);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: transform var(--transition-fast), padding-bottom var(--transition-fast);
            pointer-events: none;
            line-height: 1.3;
        }

        .folder-card:hover .folder-card__title,
        .folder-card.hover-active .folder-card__title {
            transform: translateY(-2px);
            padding-bottom: 14px;
        }

        /* Shine sweep */
        .folder-card__shine {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            background: linear-gradient(105deg,
                    transparent 38%,
                    rgba(255, 255, 255, 0.04) 42%,
                    rgba(255, 255, 255, 0.12) 45%,
                    rgba(255, 255, 255, 0.04) 48%,
                    transparent 52%);
            transition: opacity 0.3s ease;
            transform: translateX(-100%);
        }

        .folder-card:hover .folder-card__shine,
        .folder-card.hover-active .folder-card__shine {
            opacity: 1;
            animation: shineSweep 0.85s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes shineSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            background: radial-gradient(circle,
                    rgba(180, 150, 240, 0.5) 0%,
                    rgba(140, 100, 220, 0.2) 40%,
                    transparent 70%);
            animation: rippleExpand 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes rippleExpand {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(0); }
            100% { width: 300px; height: 300px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* ──────────────────────────────
           LOADING OVERLAY
           ────────────────────────────── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(6, 6, 14, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease-out;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: #b8a8f0;
            border-right-color: rgba(180, 160, 240, 0.5);
            animation: spinnerRotate 0.8s linear infinite;
            box-shadow: 0 0 28px rgba(150, 120, 230, 0.35);
        }

        @keyframes spinnerRotate { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #d0c8f0;
            letter-spacing: 0.03em;
            animation: pulseText 1.4s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* ──────────────────────────────
           SCROLLBAR
           ────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.07);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
    </style>
</head>
<body>

    <!-- Animated background -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="bg-blob bg-blob--1"></div>
        <div class="bg-blob bg-blob--2"></div>
        <div class="bg-blob bg-blob--3"></div>
    </div>
    <div class="bg-grain" aria-hidden="true"></div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>
        <p class="loading-text">Opening folder…</p>
    </div>

    <main class="main-content">
        <header class="header">
            <p class="header__brand">MOMMY UPLOADS</p>
            <h1 class="header__title">Development</h1>
            <p class="header__subtitle">Course Modules</p>
        </header>

        <!-- Folder grid (replaces old media grid) -->
        <div class="folder-grid" id="folderGrid"></div>
    </main>

    <script>
        (function() {
            // ────────────────────────────────────
            // FOLDER DATA STRUCTURE
            // ────────────────────────────────────
            const folders = [
                { name: 'Module 1: CP #1', thumbnail: 'https://i.ibb.co/fzppMVRv/Screenshot-20260429-143400.jpg', url: 'https://mega.nz/folder/q9IiUZYb#_8Rtio4bHn1c-w3bWp12xQ' }
            ];

            const folderGrid = document.getElementById('folderGrid');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // ──────────────────────────────
            // BUILD FOLDER CARDS
            // ──────────────────────────────
            function buildFolderCard(folder, index) {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-label', `Open folder: ${folder.name}`);
                card.dataset.url = folder.url;

                // Inner HTML structure
                card.innerHTML = `
                    <img class="folder-card__thumb" src="${folder.thumbnail}" alt="${folder.name}" loading="lazy" draggable="false">
                    <div class="folder-card__overlay"></div>
                    <div class="folder-card__folder-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6.465a1 1 0 01-.832-.445L10.535 5H5a2 2 0 00-2 2z" fill="white" fill-opacity="0.9"/>
                        </svg>
                    </div>
                    <div class="folder-card__title">${folder.name}</div>
                    <div class="folder-card__shine"></div>
                `;

                // Click event → loading overlay → redirect
                card.addEventListener('click', function(e) {
                    if (card.dataset.clicked === 'true') return;
                    card.dataset.clicked = 'true';
                    createRipple(card, e);
                    loadingOverlay.classList.add('active');
                    setTimeout(() => {
                        window.location.href = folder.url;
                    }, 120);
                    setTimeout(() => {
                        card.dataset.clicked = 'false';
                    }, 1000);
                });

                // Keyboard accessibility
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });

                // Magnetic hover + tilt (desktop only)
                card.addEventListener('mousemove', function(e) {
                    if (window.innerWidth <= 768) return;
                    applyTilt(card, e);
                });
                card.addEventListener('mouseenter', function(e) {
                    if (window.innerWidth <= 768) return;
                    card.classList.add('hover-active');
                    const shine = card.querySelector('.folder-card__shine');
                    if (shine) {
                        shine.style.animation = 'none';
                        shine.offsetHeight;
                        shine.style.animation = '';
                    }
                });
                card.addEventListener('mouseleave', function() {
                    card.classList.remove('hover-active');
                    resetTilt(card);
                });

                return card;
            }

            // ──────────────────────────────
            // TILT & MAGNETIC EFFECT
            // ──────────────────────────────
            function applyTilt(card, e) {
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const nx = (e.clientX - centerX) / (rect.width / 2);
                const ny = (e.clientY - centerY) / (rect.height / 2);
                const cnx = Math.max(-1, Math.min(1, nx));
                const cny = Math.max(-1, Math.min(1, ny));
                const maxTilt = 6;
                const magneticPull = 5;
                const rotateY = cnx * maxTilt;
                const rotateX = -cny * maxTilt;
                const translateX = cnx * magneticPull;
                const translateY = cny * magneticPull;
                const scale = 1.04;
                card.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${translateX}px) translateY(${translateY}px) scale(${scale})`;
                const shadowX = -cnx * 18;
                const shadowY = -cny * 18;
                card.style.boxShadow = `0 20px 50px rgba(0,0,0,0.6), ${shadowX}px ${shadowY}px 28px rgba(100,80,220,0.3)`;
            }

            function resetTilt(card) {
                card.style.transform = '';
                card.style.boxShadow = '';
                card.style.transition = 'transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.45s cubic-bezier(0.22, 0.61, 0.36, 1)';
                setTimeout(() => {
                    card.style.transition = 'transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.35s cubic-bezier(0.22, 0.61, 0.36, 1)';
                }, 450);
            }

            // ──────────────────────────────
            // RIPPLE EFFECT
            // ──────────────────────────────
            function createRipple(card, e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2;
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left) + 'px';
                ripple.style.top = (e.clientY - rect.top) + 'px';
                card.appendChild(ripple);
                ripple.addEventListener('animationend', () => {
                    if (ripple.parentNode) ripple.parentNode.removeChild(ripple);
                });
            }

            // ──────────────────────────────
            // RENDER ALL FOLDERS
            // ──────────────────────────────
            folders.forEach((folder, index) => {
                const card = buildFolderCard(folder, index);
                folderGrid.appendChild(card);
            });

            // Staggered entrance animation
            requestAnimationFrame(() => {
                const cards = folderGrid.querySelectorAll('.folder-card');
                cards.forEach((card, i) => {
                    card.style.animationDelay = `${i * 50}ms`;
                    card.classList.add('entered');
                });
            });

            // ──────────────────────────────
            // BASIC PROTECTION
            // ──────────────────────────────
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || 
                    ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','J','C','i','j','c'].includes(e.key)) ||
                    ((e.ctrlKey || e.metaKey) && ['u','U','s','S'].includes(e.key))) {
                    e.preventDefault();
                    return false;
                }
            });

            console.log('%c📂 MOMMY UPLOADS — Folder System %cActive',
                'font-size:1.2em; font-weight:700; color:#c4b8f0;', 'color:#b0b0c0;');
        })();
    </script>
</body>
</html>
