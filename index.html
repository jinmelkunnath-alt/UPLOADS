<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMMY UPLOADS — Access Portal</title>
    <style>
        :root {
            --bg-deep: #06060e;
            --cyan: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.4);
            --magenta: #c840e9;
            --magenta-dim: rgba(200, 64, 233, 0.35);
            --purple: #7c4dff;
            --red: #ff1744;
            --red-glow: rgba(255, 23, 68, 0.7);
            --gold: #ffd740;
            --glass-bg: rgba(14, 14, 28, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(6, 6, 16, 0.85);
            --text-primary: #e8e8f0;
            --text-secondary: #9999b0;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            background: var(--bg-deep);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* ── Canvas Particles ── */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Ambient Orbs ── */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.18;
            will-change: transform, opacity;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .ambient-orb.orb-1 {
            width: 320px;
            height: 320px;
            background: var(--cyan);
            top: -8%;
            left: -10%;
            animation-delay: 0s;
            animation-duration: 14s;
        }
        .ambient-orb.orb-2 {
            width: 260px;
            height: 260px;
            background: var(--magenta);
            bottom: -12%;
            right: -8%;
            animation-delay: -5s;
            animation-duration: 16s;
        }
        .ambient-orb.orb-3 {
            width: 200px;
            height: 200px;
            background: var(--purple);
            top: 45%;
            left: 55%;
            animation-delay: -9s;
            animation-duration: 18s;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -40px) scale(1.15);
            }
            50% {
                transform: translate(-20px, 25px) scale(0.9);
            }
            75% {
                transform: translate(-35px, -15px) scale(1.1);
            }
        }

        /* ── Scanlines Overlay ── */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.025) 3px,
                    rgba(0, 0, 0, 0.025) 6px);
        }

        /* ── Main Container ── */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* ── Glass Card ── */
        .glass-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 36px 28px 32px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 0 80px rgba(120, 80, 255, 0.08);
            animation: cardReveal 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            overflow: visible;
            transition: box-shadow 0.5s ease;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(420px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(0, 229, 255, 0.055),
                    transparent 55%);
            transition: background 0.15s ease-out;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.94);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Icon / Logo ── */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
        }
        .logo-hex {
            width: 52px;
            height: 52px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-hex svg {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 14px rgba(0, 229, 255, 0.6));
            animation: logoGlow 2.5s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 14px rgba(0, 229, 255, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 26px rgba(0, 229, 255, 0.9));
            }
        }

        /* ── Title ── */
        .title {
            text-align: center;
            font-family: var(--font-mono);
            font-size: clamp(1.3rem, 2.8vw, 1.65rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 6px;
            position: relative;
            z-index: 3;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.35), 0 0 60px rgba(200, 64, 233, 0.2);
        }
        .subtitle {
            text-align: center;
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            color: var(--text-secondary);
            margin-bottom: 28px;
            position: relative;
            z-index: 3;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* ── Input Wrapper (Animated Border) ── */
        .input-wrapper {
            position: relative;
            z-index: 3;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 18px;
            transition: box-shadow 0.4s ease;
        }
        .input-wrapper.focused {
            box-shadow: 0 0 28px rgba(0, 229, 255, 0.25), 0 0 50px rgba(200, 64, 233, 0.15);
        }
        .input-wrapper.error-flash {
            animation: errorFlash 0.5s ease-out;
        }
        .input-wrapper::before {
            content: '';
            position: absolute;
            inset: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(from 0deg,
                    transparent 55%,
                    var(--cyan-dim) 68%,
                    var(--magenta-dim) 78%,
                    transparent 85%,
                    transparent 100%);
            animation: borderSpin 4.5s linear infinite;
            z-index: -1;
            opacity: 0.7;
            transition: opacity 0.4s ease;
            will-change: transform;
        }
        .input-wrapper.focused::before {
            opacity: 1;
            animation-duration: 2.8s;
        }
        @keyframes borderSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .input-wrapper input {
            display: block;
            width: calc(100% - 4px);
            margin: 2px;
            padding: 15px 18px;
            font-family: var(--font-mono);
            font-size: 1.05rem;
            letter-spacing: 0.13em;
            color: #d0d0e8;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            outline: none;
            position: relative;
            z-index: 1;
            caret-color: var(--cyan);
            transition:
                box-shadow 0.35s ease,
                transform 0.1s ease;
            box-shadow: 0 0 0 0 rgba(0, 229, 255, 0);
        }
        .input-wrapper input:focus {
            box-shadow: 0 0 0 0 rgba(0, 229, 255, 0);
        }
        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 0.1em;
            font-size: 0.85rem;
        }
        .input-wrapper input.type-pulse {
            animation: typePulse 0.25s ease-out;
        }
        @keyframes typePulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 229, 255, 0);
            }
            40% {
                transform: scale(1.006);
                box-shadow: 0 0 18px rgba(0, 229, 255, 0.2);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 229, 255, 0);
            }
        }
        @keyframes errorFlash {
            0% {
                box-shadow: 0 0 0 rgba(255, 23, 68, 0);
            }
            30% {
                box-shadow: 0 0 35px rgba(255, 23, 68, 0.6), 0 0 60px rgba(255, 23, 68, 0.3);
            }
            100% {
                box-shadow: 0 0 0 rgba(255, 23, 68, 0);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            8%,
            48%,
            88% {
                transform: translateX(-5px);
            }
            28%,
            68% {
                transform: translateX(5px);
            }
        }
        .input-wrapper.shake {
            animation: shake 0.55s ease-out;
        }
        .input-wrapper.shake input {
            animation: shake 0.55s ease-out;
        }

        /* ── Submit Button ── */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #0a0a14;
            background: linear-gradient(135deg, var(--cyan) 0%, #00c8e0 50%, var(--purple) 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            z-index: 3;
            overflow: hidden;
            transition:
                transform 0.2s ease,
                box-shadow 0.35s ease;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.25), 0 0 40px rgba(124, 77, 255, 0.15);
            will-change: transform;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 229, 255, 0.4), 0 0 55px rgba(124, 77, 255, 0.25);
        }
        .btn-submit:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.2) 50%,
                    transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
            pointer-events: none;
        }
        .btn-submit:hover::after {
            transform: translateX(100%);
        }

        /* ── Hint ── */
        .hint-text {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-top: 16px;
            position: relative;
            z-index: 3;
            opacity: 0.7;
            font-family: var(--font-mono);
        }

        /* ── Error Popup ── */
        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .popup-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .popup-dialog {
            background: rgba(22, 22, 36, 0.9);
            border: 1px solid rgba(255, 23, 68, 0.35);
            border-radius: 20px;
            padding: 28px 24px 24px;
            text-align: center;
            max-width: 360px;
            width: 85%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 23, 68, 0.2);
            transform: scale(0.85);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        .popup-overlay.visible .popup-dialog {
            transform: scale(1);
            opacity: 1;
        }
        .popup-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: rgba(255, 23, 68, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
        .popup-title {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            color: #ff6b7a;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .popup-msg {
            font-size: 0.82rem;
            color: #c0c0d0;
            margin-bottom: 18px;
            letter-spacing: 0.04em;
        }
        .popup-btn {
            padding: 10px 28px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0f0;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.25s ease;
        }
        .popup-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.2);
        }

        /* ── Success Overlay ── */
        .success-burst {
            position: fixed;
            z-index: 10001;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(255, 255, 255, 0.95) 0%,
                    rgba(0, 229, 255, 0.7) 30%,
                    rgba(200, 64, 233, 0.3) 60%,
                    transparent 100%);
            width: 80px;
            height: 80px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.7s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.5s ease;
        }
        .success-burst.active {
            transform: translate(-50%, -50%) scale(55);
            opacity: 1;
        }
        .success-veil {
            position: fixed;
            inset: 0;
            z-index: 10000;
            pointer-events: none;
            background: #ffffff;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .success-veil.active {
            opacity: 1;
            transition: opacity 0.35s ease 0.35s;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .glass-card {
                padding: 28px 18px 24px;
                border-radius: 20px;
            }
            .glass-card::after {
                border-radius: 20px;
            }
            .input-wrapper {
                border-radius: 12px;
            }
            .input-wrapper input {
                padding: 13px 14px;
                font-size: 0.95rem;
                border-radius: 10px;
            }
            .btn-submit {
                padding: 13px;
                font-size: 0.85rem;
                border-radius: 12px;
            }
            .title {
                font-size: 1.15rem;
                letter-spacing: 0.16em;
            }
            .subtitle {
                font-size: 0.7rem;
                margin-bottom: 22px;
            }
            .logo-hex svg {
                width: 38px;
                height: 38px;
            }
        }
        @media (min-width: 768px) {
            .glass-card {
                padding: 42px 36px 36px;
            }
            .input-wrapper input {
                padding: 17px 20px;
                font-size: 1.1rem;
            }
            .btn-submit {
                padding: 17px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ── Particle Canvas ── -->
    <canvas id="particleCanvas"></canvas>

    <!-- ── Ambient Orbs ── -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <!-- ── Scanlines ── -->
    <div class="scanlines"></div>

    <!-- ── Main Container ── -->
    <div class="main-container">
        <div class="glass-card" id="glassCard">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-hex">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="24,4 44,14 44,34 24,44 4,34 4,14"
                        fill="none"
                        stroke="#00e5ff"
                        stroke-width="1.8"
                        stroke-linejoin="round"
                        opacity="0.9" />
                        <polygon points="24,10 38,17 38,31 24,38 10,31 10,17"
                        fill="none"
                        stroke="#c840e9"
                        stroke-width="1.2"
                        stroke-linejoin="round"
                        opacity="0.7" />
                        <circle cx="24" cy="24" r="4" fill="#00e5ff" opacity="0.8" />
                    </svg>
                </div>
            </div>

            <!-- Title -->
            <h1 class="title">MOMMY UPLOADS</h1>
            <p class="subtitle">Access Portal &bull; Clearance Required</p>

            <!-- Input -->
            <div class="input-wrapper" id="inputWrapper">
                <input
                type="text"
                id="accessInput"
                placeholder="ENTER ACCESS CODE"
                autocomplete="off"
                spellcheck="false"
                maxlength="30"
                >
            </div>

            <!-- Submit Button -->
            <button class="btn-submit" id="btnSubmit">Authenticate</button>

            <!-- Hint -->
            <p class="hint-text">Secure Terminal &bull; Level 5 Encryption</p>
        </div>
    </div>

    <!-- ── Error Popup ── -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-dialog">
            <div class="popup-icon">⛔</div>
            <div class="popup-title">Access Denied</div>
            <div class="popup-msg">Invalid Access Code</div>
            <button class="popup-btn" id="popupDismiss">Dismiss</button>
        </div>
    </div>

    <!-- ── Success Burst ── -->
    <div class="success-burst" id="successBurst"></div>
    <div class="success-veil" id="successVeil"></div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // 🔐 Encoded Access Codes (Base64)
            // ──────────────────────────────────────
            const _k = [
                "QVJDQUNDRUhTRVNM",
                "QVBBQ1JDVkVBU1RT",
                "QVRDQUNDRUVTRlNY",
                "QUlDTUNNRVUTSFNI",
                "QU1DQUNTRVRTRVNS"
            ];

            function _d(s) {
                try {
                    return atob(s);
                } catch (e) {
                    return "";
                }
            }

            const validCodes = _k.map(function(c) { return _d(c); });

            // ──────────────────────────────────────
            // DOM References
            // ──────────────────────────────────────
            const inputWrapper = document.getElementById('inputWrapper');
            const accessInput = document.getElementById('accessInput');
            const btnSubmit = document.getElementById('btnSubmit');
            const glassCard = document.getElementById('glassCard');
            const popupOverlay = document.getElementById('popupOverlay');
            const popupDismiss = document.getElementById('popupDismiss');
            const successBurst = document.getElementById('successBurst');
            const successVeil = document.getElementById('successVeil');
            const particleCanvas = document.getElementById('particleCanvas');
            const ctx = particleCanvas.getContext('2d');

            // ──────────────────────────────────────
            // Canvas Setup
            // ──────────────────────────────────────
            let canvasW, canvasH;
            const particles = [];
            const PARTICLE_COUNT = 38;
            const neonColors = [
                'rgba(0,229,255,', // cyan
                'rgba(200,64,233,', // magenta
                'rgba(124,77,255,', // purple
                'rgba(0,200,220,', // teal
                'rgba(180,100,255,', // violet
            ];

            function resizeCanvas() {
                canvasW = particleCanvas.width = window.innerWidth;
                canvasH = particleCanvas.height = window.innerHeight;
            }

            function createParticle() {
                return {
                    x: Math.random() * canvasW,
                    y: Math.random() * canvasH,
                    r: Math.random() * 1.8 + 0.6,
                    speedY: Math.random() * 0.35 + 0.12,
                    speedX: (Math.random() - 0.5) * 0.25,
                    colorIndex: Math.floor(Math.random() * neonColors.length),
                    opacity: Math.random() * 0.6 + 0.15,
                    pulse: Math.random() * Math.PI * 2,
                    pulseSpeed: Math.random() * 0.018 + 0.006,
                };
            }

            function initParticles() {
                particles.length = 0;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(createParticle());
                }
            }

            function updateParticles() {
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.y -= p.speedY;
                    p.x += p.speedX + Math.sin(p.pulse) * 0.3;
                    p.pulse += p.pulseSpeed;
                    p.opacity += Math.sin(p.pulse * 0.7) * 0.004;
                    p.opacity = Math.max(0.08, Math.min(0.75, p.opacity));

                    if (p.y < -10) {
                        p.y = canvasH + 10;
                        p.x = Math.random() * canvasW;
                    }
                    if (p.x < -10) p.x = canvasW + 10;
                    if (p.x > canvasW + 10) p.x = -10;
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const baseColor = neonColors[p.colorIndex];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = baseColor + p.opacity + ')';
                    ctx.fill();
                    // Glow halo
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = baseColor + (p.opacity * 0.25) + ')';
                    ctx.fill();
                }
            }

            function animateParticles() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animateParticles);
            }

            resizeCanvas();
            initParticles();
            animateParticles();
            window.addEventListener('resize', function() {
                resizeCanvas();
                initParticles();
            });

            // ──────────────────────────────────────
            // Mouse Trail on Glass Card
            // ──────────────────────────────────────
            glassCard.addEventListener('mousemove', function(e) {
                const rect = glassCard.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                glassCard.style.setProperty('--mouse-x', x + '%');
                glassCard.style.setProperty('--mouse-y', y + '%');
            });
            glassCard.addEventListener('mouseleave', function() {
                glassCard.style.setProperty('--mouse-x', '50%');
                glassCard.style.setProperty('--mouse-y', '50%');
            });
            // Touch support
            glassCard.addEventListener('touchmove', function(e) {
                const rect = glassCard.getBoundingClientRect();
                const touch = e.touches[0];
                const x = ((touch.clientX - rect.left) / rect.width) * 100;
                const y = ((touch.clientY - rect.top) / rect.height) * 100;
                glassCard.style.setProperty('--mouse-x', x + '%');
                glassCard.style.setProperty('--mouse-y', y + '%');
            }, { passive: true });
            glassCard.addEventListener('touchend', function() {
                glassCard.style.setProperty('--mouse-x', '50%');
                glassCard.style.setProperty('--mouse-y', '50%');
            });

            // ──────────────────────────────────────
            // Input Focus / Blur
            // ──────────────────────────────────────
            accessInput.addEventListener('focus', function() {
                inputWrapper.classList.add('focused');
            });
            accessInput.addEventListener('blur', function() {
                inputWrapper.classList.remove('focused');
            });

            // ──────────────────────────────────────
            // Typing Pulse Animation
            // ──────────────────────────────────────
            let typePulseTimeout;
            accessInput.addEventListener('input', function() {
                // Brief pulse on each keystroke
                accessInput.classList.remove('type-pulse');
                void accessInput.offsetWidth;
                accessInput.classList.add('type-pulse');
                clearTimeout(typePulseTimeout);
                typePulseTimeout = setTimeout(function() {
                    accessInput.classList.remove('type-pulse');
                }, 260);
            });

            // ──────────────────────────────────────
            // Submit Handler
            // ──────────────────────────────────────
            function triggerSuccess() {
                // Get input position for burst origin
                const inputRect = accessInput.getBoundingClientRect();
                const cx = inputRect.left + inputRect.width / 2;
                const cy = inputRect.top + inputRect.height / 2;
                successBurst.style.top = cy + 'px';
                successBurst.style.left = cx + 'px';
                successBurst.style.transform = 'translate(-50%, -50%) scale(0)';
                successBurst.style.opacity = '0';

                // Trigger burst
                requestAnimationFrame(function() {
                    successBurst.classList.add('active');
                });

                // Fade veil
                setTimeout(function() {
                    successVeil.classList.add('active');
                }, 280);

                // Redirect
                setTimeout(function() {
                    window.location.href = 'cat.html';
                }, 750);
            }

            function triggerError() {
                // Shake + red flash
                inputWrapper.classList.remove('shake', 'error-flash');
                void inputWrapper.offsetWidth;
                inputWrapper.classList.add('shake', 'error-flash');

                // Show popup
                setTimeout(function() {
                    popupOverlay.classList.add('visible');
                }, 250);

                // Auto-clean shake classes
                setTimeout(function() {
                    inputWrapper.classList.remove('shake', 'error-flash');
                }, 600);

                // Clear input
                accessInput.value = '';
                accessInput.focus();
            }

            function handleSubmit() {
                const code = accessInput.value.trim().toUpperCase();
                if (validCodes.indexOf(code) !== -1) {
                    // SUCCESS
                    accessInput.blur();
                    triggerSuccess();
                } else {
                    // ERROR
                    triggerError();
                }
            }

            btnSubmit.addEventListener('click', handleSubmit);
            accessInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            // ──────────────────────────────────────
            // Popup Dismiss
            // ──────────────────────────────────────
            function dismissPopup() {
                popupOverlay.classList.remove('visible');
                accessInput.focus();
            }
            popupDismiss.addEventListener('click', dismissPopup);
            popupOverlay.addEventListener('click', function(e) {
                if (e.target === popupOverlay) {
                    dismissPopup();
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && popupOverlay.classList.contains('visible')) {
                    dismissPopup();
                }
            });

            // ──────────────────────────────────────
            // Basic Protection
            // ──────────────────────────────────────
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('keydown', function(e) {
                // Block common devtool shortcuts
                const blockedCombos = [
                    { ctrl: true, shift: true, key: 'I' },
                    { ctrl: true, shift: true, key: 'J' },
                    { ctrl: true, shift: true, key: 'C' },
                    { ctrl: true, key: 'U' },
                    { ctrl: true, key: 'u' },
                    { key: 'F12' },
                ];
                for (let combo of blockedCombos) {
                    const ctrlOk = combo.ctrl ? (e.ctrlKey || e.metaKey) : true;
                    const shiftOk = combo.shift ? e.shiftKey : true;
                    const keyOk = e.key === combo.key || e.code === combo.key;
                    if (ctrlOk && shiftOk && keyOk) {
                        e.preventDefault();
                        return false;
                    }
                }
            });

            // ──────────────────────────────────────
            // Initial Focus
            // ──────────────────────────────────────
            setTimeout(function() {
                accessInput.focus();
            }, 600);

            // ──────────────────────────────────────
            // Log Obfuscated Info
            // ──────────────────────────────────────
            console.log('%c🔐 MOMMY UPLOADS Access Portal %c│ %cSecure Terminal v5.2',
                'color:#00e5ff;font-weight:bold;',
                'color:#999;',
                'color:#c840e9;');
            console.log('%c⚠️ Unauthorized access attempts are logged and tracked.',
                'color:#ff1744;font-size:0.8em;');
        })();
    </script>
